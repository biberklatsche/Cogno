@if (node) {
    @if(node.isLeaf) {
        <app-pane [class.focus]="node.data!.isFocused"
                  [pane]="node.data!">
        </app-pane>
    } @else {
        <div class="grid-container"
             (window:mouseup)="stopDragDivider()"
             (window:mousemove)="onDragDivider($event)"
             [ngStyle]="styleForSplit(node.data!.splitDirection!, node.data!.ratio)">
            <div class="cell">
                <app-grid [node]="node.left!"></app-grid>
            </div>
            <div class="divider"
                 [class.vertical]="node.data!.splitDirection==='vertical'"
                 [class.horizontal]="node.data!.splitDirection==='horizontal'"
                 (mousedown)="startDragDivider(node, $event)">
            </div>
            <div class="cell">
                <app-grid [node]="node.right!"></app-grid>
            </div>
        </div>
    }
}
